name: Deploy Dashboard to Vercel

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-dashboard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Dashboard CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://your-project.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test_anon_key
        run: pnpm --dir dashboard run build

      - name: Typecheck
        run: pnpm --dir dashboard run typecheck

  deploy:
    name: Deploy to Vercel
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Validate required deploy secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          missing=()
          for secret in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!secret:-}" ]; then
              missing+=("${secret}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required GitHub environment secrets: ${missing[*]}"
            echo "::error::Configure these in Settings -> Environments -> production -> Environment secrets"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Deploy to Vercel
        working-directory: dashboard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: pnpm dlx vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN"
