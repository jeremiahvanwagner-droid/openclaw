name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bot:
    name: Bot Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint source
        run: pnpm lint:source
      - name: Type check
        run: pnpm typecheck
      - name: Run tests
        run: pnpm test

  dashboard:
    name: Dashboard Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Dashboard typecheck
        run: pnpm --filter dashboard typecheck
      - name: Dashboard build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://your-project.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test_anon_key
        run: pnpm --filter dashboard build
