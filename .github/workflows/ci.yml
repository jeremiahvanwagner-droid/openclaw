name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bot:
    name: Bot Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Lint baseline gate
        run: corepack pnpm lint:ci
      - name: Type check
        run: corepack pnpm typecheck
      - name: Run tests
        run: corepack pnpm test

  dashboard:
    name: Dashboard Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Dashboard build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://your-project.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test_anon_key
        run: corepack pnpm --dir dashboard run build
      - name: Dashboard typecheck
        run: corepack pnpm --dir dashboard run typecheck
