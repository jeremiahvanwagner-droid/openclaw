name: Deploy Bot to Hetzner VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dashboard/**'
      - 'docs/**'
      - '*.md'

  workflow_dispatch:
    inputs:
      upgrade_cli:
        description: 'Also upgrade openclaw CLI on server'
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/openclaw
            if [ "${{ github.event.inputs.upgrade_cli }}" = "true" ]; then
              sudo bash deploy/hetzner/deploy.sh --upgrade
            else
              sudo bash deploy/hetzner/deploy.sh
            fi

      - name: Health Check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            sleep 5
            curl -sf http://localhost:18789/health || (echo "Gateway health check failed" && exit 1)
            curl -sf http://localhost:8788/health || (echo "Webhook health check failed" && exit 1)
            echo "All services healthy"

      - name: Notify Telegram
        if: always()
        uses: appleboy/telegram-action@v1
        with:
          to: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ${{ job.status == 'success' && '✅' || '❌' }} OpenClaw Deploy — ${{ job.status }}
            Commit: ${{ github.sha }}
            By: ${{ github.actor }}
