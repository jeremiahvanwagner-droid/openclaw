name: Deploy Bot to Hetzner VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dashboard/**'
      - 'docs/**'
      - '*.md'

  workflow_dispatch:
    inputs:
      upgrade_cli:
        description: 'Also upgrade openclaw CLI on server'
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/openclaw
            if [ "${{ github.event.inputs.upgrade_cli }}" = "true" ]; then
              sudo bash deploy/hetzner/deploy.sh --upgrade
            else
              sudo bash deploy/hetzner/deploy.sh
            fi

      - name: Health Check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            sleep 5
            curl -sf http://localhost:18789/health || (echo "Gateway health check failed" && exit 1)
            curl -sf http://localhost:8788/health || (echo "Webhook health check failed" && exit 1)
            echo "All services healthy"

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          STATUS: ${{ job.status }}
          COMMIT: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          ICON=$( [ "$STATUS" = "success" ] && echo "✅" || echo "❌" )
          MSG="${ICON} OpenClaw Deploy — ${STATUS}%0ACommit: ${COMMIT}%0ABy: ${ACTOR}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode=HTML
