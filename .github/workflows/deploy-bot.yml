name: Deploy Bot to Hetzner VPS (Manual)

on:
  workflow_dispatch:
    inputs:
      upgrade_cli:
        description: "Also upgrade openclaw CLI on server"
        type: boolean
        default: false
      clean_server_checkout:
        description: "Clean /opt/openclaw when working tree is dirty"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-bot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Lint baseline gate
        run: corepack pnpm lint:ci
      - name: Type check
        run: corepack pnpm typecheck
      - name: Run tests
        run: corepack pnpm test

  deploy:
    name: Deploy to Hetzner
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production

    steps:
      - id: validate_ssh_secrets
        name: Validate SSH secrets
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for secret in HETZNER_HOST HETZNER_USER HETZNER_SSH_KEY; do
            if [ -z "${!secret:-}" ]; then
              missing+=("${secret}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required GitHub environment secrets: ${missing[*]}"
            echo "::error::Configure these in Settings -> Environments -> production -> Environment secrets"
            exit 1
          fi

      - name: Preflight server checkout state
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -eu
            git config --global --add safe.directory /opt/openclaw 2>/dev/null || true
            CLEAN_SERVER_CHECKOUT="${{ github.event.inputs.clean_server_checkout }}"
            cd /opt/openclaw
            # Only check tracked files; untracked dirs like .openclaw/ are created by deploy itself
            status="$(git status --porcelain --untracked-files=no)"
            if [ -n "${status}" ]; then
              echo "Remote checkout has local changes:"
              git status --short
              if [ "${CLEAN_SERVER_CHECKOUT}" = "true" ]; then
                echo "Cleaning remote checkout because clean_server_checkout=true"
                git reset --hard HEAD
                git clean -fd
              else
                echo "::error::Remote checkout is dirty. Re-run workflow_dispatch with clean_server_checkout=true or clean /opt/openclaw manually."
                exit 1
              fi
            fi

      - name: Validate sudo access
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            sudo -n true 2>/dev/null || { echo "::error::User $USER does not have passwordless sudo. deploy.sh requires sudo."; exit 1; }

      - id: deploy_ssh
        name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 20m
          script: |
            cd /opt/openclaw
            if [ "${{ github.event.inputs.upgrade_cli }}" = "true" ]; then
              sudo bash deploy/hetzner/deploy.sh --upgrade
            else
              sudo bash deploy/hetzner/deploy.sh
            fi

      - name: Health Check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 3m
          script: |
            sleep 10
            for i in 1 2 3 4 5; do
              curl -sf http://localhost:18789/health && break
              echo "Gateway not ready, retrying ($i/5)..."
              sleep 5
            done
            curl -sf http://localhost:18789/health || { echo "::error::Gateway health check failed"; exit 1; }
            for i in 1 2 3; do
              curl -sf http://localhost:8788/health && break
              echo "Webhook not ready, retrying ($i/3)..."
              sleep 3
            done
            curl -sf http://localhost:8788/health || { echo "::error::Webhook health check failed"; exit 1; }
            echo "Gateway and webhook healthy"

      - name: Collect service diagnostics on failure
        if: failure() && steps.validate_ssh_secrets.outcome == 'success'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 5m
          script: |
            set +e
            echo "===== openclaw.service status ====="
            sudo systemctl status openclaw --no-pager -l || true
            echo "===== openclaw-webhook.service status ====="
            sudo systemctl status openclaw-webhook --no-pager -l || true
            echo "===== openclaw journal (last 200) ====="
            sudo journalctl -u openclaw -n 200 --no-pager || true
            echo "===== webhook journal (last 200) ====="
            sudo journalctl -u openclaw-webhook -n 200 --no-pager || true

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          STATUS: ${{ job.status }}
          COMMIT: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          ICON=$( [ "$STATUS" = "success" ] && echo "SUCCESS" || echo "FAIL" )
          MSG="[${ICON}] OpenClaw Deploy - ${STATUS}%0ACommit: ${COMMIT}%0ABy: ${ACTOR}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode=HTML
