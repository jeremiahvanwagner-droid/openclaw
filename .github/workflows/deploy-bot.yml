name: Deploy Bot to Hetzner VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dashboard/**'
      - 'docs/**'
      - '*.md'

  workflow_dispatch:
    inputs:
      upgrade_cli:
        description: 'Also upgrade openclaw CLI on server'
        type: boolean
        default: false
      clean_server_checkout:
        description: 'Clean /opt/openclaw when working tree is dirty (workflow_dispatch only)'
        type: boolean
        default: false

concurrency:
  group: deploy-bot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint source
        run: pnpm lint:source
      - name: Type check
        run: pnpm typecheck
      - name: Run tests
        run: pnpm test

  deploy:
    name: Deploy to Hetzner
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production

    steps:
      - name: Validate SSH secrets
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for secret in HETZNER_HOST HETZNER_USER HETZNER_SSH_KEY; do
            if [ -z "${!secret:-}" ]; then
              missing+=("${secret}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required GitHub environment secrets: ${missing[*]}"
            echo "::error::Configure these in Settings → Environments → production → Environment secrets"
            exit 1
          fi

      - name: Preflight server checkout state
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -eu
            git config --global --add safe.directory /opt/openclaw 2>/dev/null || true
            CLEAN_SERVER_CHECKOUT="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clean_server_checkout || 'false' }}"
            cd /opt/openclaw
            # Only check tracked files — untracked dirs like .openclaw/ are created by deploy itself
            status="$(git status --porcelain --untracked-files=no)"
            if [ -n "${status}" ]; then
              echo "Remote checkout has local changes:"
              git status --short
              if [ "${CLEAN_SERVER_CHECKOUT}" = "true" ]; then
                echo "Cleaning remote checkout because clean_server_checkout=true"
                git reset --hard HEAD
                git clean -fd
              else
                echo "::error::Remote checkout is dirty. Re-run workflow_dispatch with clean_server_checkout=true or clean /opt/openclaw manually."
                exit 1
              fi
            fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 20m
          script: |
            cd /opt/openclaw
            # Ensure pnpm is available on the VPS
            command -v pnpm >/dev/null 2>&1 || npm install -g pnpm
            if [ "${{ github.event.inputs.upgrade_cli }}" = "true" ]; then
              sudo bash deploy/hetzner/deploy.sh --upgrade
            else
              sudo bash deploy/hetzner/deploy.sh
            fi

      - name: Health Check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 3m
          script: |
            sleep 10
            for i in 1 2 3 4 5; do
              curl -sf http://localhost:18789/health && break
              echo "Gateway not ready, retrying ($i/5)..."
              sleep 5
            done
            curl -sf http://localhost:18789/health || { echo "::error::Gateway health check failed"; exit 1; }
            for i in 1 2 3; do
              curl -sf http://localhost:8788/health && break
              echo "Webhook not ready, retrying ($i/3)..."
              sleep 3
            done
            curl -sf http://localhost:8788/health || { echo "::error::Webhook health check failed"; exit 1; }
            echo "All services healthy"

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          STATUS: ${{ job.status }}
          COMMIT: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          ICON=$( [ "$STATUS" = "success" ] && echo "✅" || echo "❌" )
          MSG="${ICON} OpenClaw Deploy — ${STATUS}%0ACommit: ${COMMIT}%0ABy: ${ACTOR}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode=HTML
