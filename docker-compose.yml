# ═══════════════════════════════════════════════════════════════
# OpenClaw — Local Development Docker Compose
# Usage: docker compose up
# ═══════════════════════════════════════════════════════════════

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-bot
    env_file: .env
    environment:
      - HOME=/opt/openclaw
      - OPENCLAW_CONFIG_DIR=/opt/openclaw/.openclaw
    command: ["openclaw", "gateway", "--port", "18789", "--allow-unconfigured"]
    ports:
      - "18789:18789"
    volumes:
      - ./data:/opt/openclaw/data
      - ./logs:/opt/openclaw/logs
      - /root/.openclaw/openclaw.json:/opt/openclaw/.openclaw/openclaw.json:ro
      - /root/.openclaw/openclaw.json:/opt/openclaw/config/openclaw.json:ro
      - ./backups:/opt/openclaw/backups
      - ./media:/opt/openclaw/media
      - ./memory:/opt/openclaw/memory
    # Sandbox browser support
    shm_size: "512m"
    restart: "no"  # systemd manages production — Docker is dev-only

  webhook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-webhook
    env_file: .env
    command: ["node", "handlers/ghl-webhook-handler.mjs"]
    ports:
      - "8788:8788"
    volumes:
      - ./data:/opt/openclaw/data
      - ./logs:/opt/openclaw/logs
    restart: "no"  # systemd manages production — Docker is dev-only
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8788/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - bot
