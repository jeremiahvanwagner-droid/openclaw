# ═══════════════════════════════════════════════════════════════
# OpenClaw — Local Development Docker Compose
# Usage: docker compose up
#
# Phase 9.1.1 reconciliation (2026-05-13):
#   - The `ollama` service has been REMOVED. Host Ollama (systemd)
#     owns 127.0.0.1:11434 on this VPS and serves qwen3.6:latest +
#     qwen3:8b. The previous container service silently failed on
#     every restart due to port conflict (P2 violation).
#   - `bot` and `webhook` now reach host Ollama via
#     `host.docker.internal:11434` (Docker bridge gateway).
# ═══════════════════════════════════════════════════════════════

volumes:
  redis-data:
  # ollama-data volume retained (orphaned) for safe rollback;
  # remove in Phase 10 cleanup after host-Ollama setup is proven stable.
  ollama-data:

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-bot
    env_file: .env
    environment:
      - HOME=/opt/openclaw
      - OPENCLAW_CONFIG_DIR=/opt/openclaw/.openclaw
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_HOST=http://host.docker.internal:11434
    command: ["openclaw", "gateway", "--port", "18789", "--allow-unconfigured"]
    ports:
      - "18789:18789"
    volumes:
      - ./data:/opt/openclaw/data
      - ./logs:/opt/openclaw/logs
      - /root/.openclaw:/opt/openclaw/.openclaw
      - ./backups:/opt/openclaw/backups
      - ./templates/AGENTS.md.template:/opt/openclaw/docs/reference/templates/AGENTS.md:ro
      - ./templates/MEMORY.md.template:/opt/openclaw/docs/reference/templates/MEMORY.md:ro
      - ./templates/SOUL.md.template:/opt/openclaw/docs/reference/templates/SOUL.md:ro
      - ./templates/TOOLS.md.template:/opt/openclaw/docs/reference/templates/TOOLS.md:ro
      - ./templates/USER.md.template:/opt/openclaw/docs/reference/templates/USER.md:ro
      - ./media:/opt/openclaw/media
      - ./memory:/opt/openclaw/memory
    # Sandbox browser support
    shm_size: "512m"
    restart: "on-failure"
    # Map host.docker.internal → host gateway IP so the container
    # can reach the systemd-managed Ollama on the host network.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: "no"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: redis-server --appendonly yes

  # ─────────────────────────────────────────────────────────────
  # NOTE: The `ollama` service was removed in Phase 9.1.1.
  # Host Ollama (systemd-managed at /etc/systemd/system/ollama.service)
  # serves the qwen3.6 + qwen3:8b models on 127.0.0.1:11434.
  # Containers reach it via host.docker.internal:11434.
  # To verify host Ollama: `systemctl status ollama && ollama list`.
  # ─────────────────────────────────────────────────────────────

  webhook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-webhook
    env_file: .env
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    command: ["node", "handlers/ghl-webhook-handler.mjs"]
    ports:
      - "8788:8788"
    volumes:
      - ./data:/opt/openclaw/data
      - ./logs:/opt/openclaw/logs
    restart: "on-failure"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8788/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - bot
      - redis
