# ═══════════════════════════════════════════════════════════════
# OpenClaw — Docker Compose (Phase 9.1.2 reconciliation, 2026-05-13)
#
# ARCHITECTURAL REALITY:
#   OpenClaw runs NATIVELY on the host as a systemd service:
#       systemd unit: openclaw.service
#       binary:       /usr/bin/node /usr/lib/node_modules/openclaw/dist/index.js
#       user:         openclaw
#       port:         127.0.0.1:18789
#
#   Ollama also runs NATIVELY on the host as a systemd service:
#       systemd unit: ollama.service
#       binary:       /usr/local/bin/ollama serve
#       port:         127.0.0.1:11434
#
#   This compose file ONLY runs the supporting services that are not
#   host-installed (currently: Redis). The previous `bot`, `webhook`,
#   and `ollama` services in this file were never actually the runtime;
#   they failed silently on every restart due to port conflicts with the
#   host installs.
#
# OPERATOR RUNBOOK (after `git pull` of this commit):
#   docker compose down --remove-orphans
#   docker compose up -d                       # only redis comes up
#   systemctl restart openclaw                 # reloads agents_config.json
#   systemctl status openclaw --no-pager       # confirm active (running)
#   systemctl restart ollama                   # (only if Ollama config changed)
#
#   To make the host services persistent across reboots:
#     systemctl enable openclaw ollama
# ═══════════════════════════════════════════════════════════════

volumes:
  redis-data:

services:
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: "unless-stopped"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: redis-server --appendonly yes

# ─────────────────────────────────────────────────────────────
# REMOVED SERVICES (kept here as comments for forensic clarity):
#
#   bot      — Replaced by host systemd `openclaw.service`.
#              The container could not bind 0.0.0.0:18789 because
#              the host service already owns 127.0.0.1:18789.
#
#   webhook  — Replaced by host systemd OpenClaw webhook handler
#              (same node process serves /webhooks endpoints).
#
#   ollama   — Replaced by host systemd `ollama.service`.
#              The container could not bind 0.0.0.0:11434 because
#              the host service already owns 127.0.0.1:11434.
#
# These were declared in compose but never the actual runtime.
# Discharges P2 violations (orphaned config vs deployed reality).
# Forensic detail in: docs/phases/host-native-reconcile-phase-9-1-2.md
# ─────────────────────────────────────────────────────────────
