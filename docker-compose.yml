# ═══════════════════════════════════════════════════════════════
# OpenClaw — Local Development Docker Compose
# Usage: docker compose up
# ═══════════════════════════════════════════════════════════════

volumes:
  redis-data:
  ollama-data:

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-bot
    env_file: .env
    environment:
      - HOME=/opt/openclaw
      - OPENCLAW_CONFIG_DIR=/opt/openclaw/.openclaw
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_HOST=http://ollama:11434
    command: ["openclaw", "gateway", "--port", "18789", "--allow-unconfigured"]
    ports:
      - "18789:18789"
    volumes:
      - ./data:/opt/openclaw/data
      - ./logs:/opt/openclaw/logs
      - /root/.openclaw:/opt/openclaw/.openclaw
      - ./backups:/opt/openclaw/backups
      - ./templates/AGENTS.md.template:/opt/openclaw/docs/reference/templates/AGENTS.md:ro
      - ./templates/MEMORY.md.template:/opt/openclaw/docs/reference/templates/MEMORY.md:ro
      - ./templates/SOUL.md.template:/opt/openclaw/docs/reference/templates/SOUL.md:ro
      - ./templates/TOOLS.md.template:/opt/openclaw/docs/reference/templates/TOOLS.md:ro
      - ./templates/USER.md.template:/opt/openclaw/docs/reference/templates/USER.md:ro
      - ./media:/opt/openclaw/media
      - ./memory:/opt/openclaw/memory
    # Sandbox browser support
    shm_size: "512m"
    restart: "on-failure"
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: "no"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: redis-server --appendonly yes

  ollama:
    image: ollama/ollama:latest
    container_name: openclaw-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: "no"
    healthcheck:
      # ollama image does not ship with curl; use the bundled `ollama` CLI instead
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    # Note: Models are loaded on first request. To pre-load models, run:
    #   docker exec openclaw-ollama ollama pull llama3.1:8b
    #   docker exec openclaw-ollama ollama pull nomic-embed-text

  webhook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-webhook
    env_file: .env
    command: ["node", "handlers/ghl-webhook-handler.mjs"]
    ports:
      - "8788:8788"
    volumes:
      - ./data:/opt/openclaw/data
      - ./logs:/opt/openclaw/logs
    restart: "on-failure"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8788/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - bot
      - redis
      - ollama
