global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: "openclaw-webhook"
    static_configs:
      - targets: ["host.docker.internal:8788"]
        labels:
          service: "webhook-handler"
    metrics_path: /metrics
    scrape_interval: 15s
