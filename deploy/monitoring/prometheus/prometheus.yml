global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # Gateway health check — openclaw does not expose a /metrics endpoint (confirmed 2026-05-13).
  # Using blackbox-style HTTP probe against /healthz until upstream adds Prometheus metrics.
  # To restore scraping when /metrics is available, uncomment the block below and remove this note.
