groups:
  - name: openclaw_alerts
    interval: 30s
    rules:
      # LLM p99 latency > 10 seconds
      - alert: LLMLatencyHigh
        expr: histogram_quantile(0.99, rate(openclaw_llm_request_duration_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM p99 latency exceeds 10s"
          description: "Provider {{ $labels.provider }} model {{ $labels.model }} p99 latency is {{ $value }}s"

      # Circuit breaker OPEN > 5 minutes
      - alert: CircuitBreakerOpen
        expr: openclaw_circuit_breaker_state == 2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker OPEN for {{ $labels.provider }}"
          description: "Provider {{ $labels.provider }} circuit breaker has been open for >5 minutes"

      # Budget > 90% consumed
      - alert: BudgetNearCeiling
        expr: (openclaw_budget_used_dollars / openclaw_budget_ceiling_dollars) > 0.9
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Budget >90% consumed for {{ $labels.provider }}"
          description: "Provider {{ $labels.provider }} has used {{ $value | humanizePercentage }} of daily budget"

      # Supervisor agent unhealthy > 15 minutes
      - alert: SupervisorUnhealthy
        expr: openclaw_agent_health{pod_id=~".*supervisor.*"} < 2
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Supervisor {{ $labels.agent_id }} is unhealthy"
          description: "Agent {{ $labels.agent_id }} in {{ $labels.division }} pod {{ $labels.pod_id }} health is {{ $value }} (expected 2=active)"

      # Gateway target unavailable
      - alert: GatewayDown
        expr: up{job="openclaw-gateway"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "OpenClaw gateway scrape target is down"
          description: "Prometheus cannot reach the OpenClaw gateway metrics endpoint for >2m."

      # Gateway process restart spikes (if process metrics are exported)
      - alert: GatewayRestartSpike
        expr: changes(process_start_time_seconds{job="openclaw-gateway"}[15m]) > 2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Gateway restart spike detected"
          description: "Gateway process restarted more than twice in 15 minutes."

      # Caddy upstream failures
      - alert: Caddy502Burst
        expr: sum(increase(caddy_http_response_status_count_total{status="502"}[5m])) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Caddy upstream 502 burst"
          description: "More than 10 HTTP 502 responses observed in 5 minutes."

      # Browser relay attach failures (requires gateway metric emission)
      - alert: RelayAttachFailures
        expr: sum(increase(openclaw_browser_relay_attach_failures_total[10m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Browser relay attach failures detected"
          description: "At least one browser relay attach failure occurred in the last 10 minutes."

      # Gateway auth mismatches (requires gateway metric emission)
      - alert: GatewayAuthMismatch
        expr: sum(increase(openclaw_gateway_auth_mismatch_total[10m])) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Gateway auth mismatch events detected"
          description: "Gateway observed authentication mismatch events in the last 10 minutes."
